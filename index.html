<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Midnight Mug | Premium Digital Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        :root { --gold: #ff9f43; --bg: #070707; --glass: rgba(255, 255, 255, 0.03); --neon: #00ffaa; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Outfit', sans-serif; 
            overflow-x: hidden; /* Phone par side-scroll rokne ke liye */
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; top: 0; width: 100%; padding: 15px 5%; 
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(7, 7, 7, 0.95); backdrop-filter: blur(15px); z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-size: 1.2rem; font-weight: 900; color: var(--gold); font-family: 'Playfair Display', serif; }

        /* --- MOBILE TEXT OPTIMIZATION --- */
        h1, .section-title { 
            font-size: clamp(2.2rem, 8vw, 4.5rem); /* Phone par chota, laptop par bada */
            line-height: 1.1; 
            font-family: 'Playfair Display', serif;
        }

        /* --- REVEAL ANIMATION --- */
        .reveal { opacity: 0; transform: translateY(30px); transition: 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        section { padding: 100px 8% 60px; min-height: auto; }

        /* --- HERO --- */
        .hero { text-align: center; padding-top: 140px; }
        .hero p { font-size: 1rem; color: #888; margin: 20px auto; max-width: 500px; }

        /* --- MENU CARDS (Responsive) --- */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; 
            margin-top: 40px;
        }
        .card { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.08); 
            padding: 20px; border-radius: 20px; text-align: left;
        }
        .card img { width: 100%; height: 220px; object-fit: cover; border-radius: 15px; }
        
        .order-btn { 
            width: 100%; padding: 15px; margin-top: 15px;
            background: var(--gold); color: #000; 
            border: none; border-radius: 12px; font-weight: 800; cursor: pointer; 
        }

        /* --- NEON PRICING TRICK --- */
        .pricing-banner {
            background: #000; border: 2px solid var(--neon);
            padding: 40px 20px; border-radius: 25px; text-align: center;
            box-shadow: 0 0 30px rgba(0, 255, 170, 0.15); margin-top: 40px;
        }
        .old-price { font-size: 1.5rem; color: #555; text-decoration: line-through; text-decoration-color: #ff5f56; }
        .new-price { font-size: 3.5rem; font-weight: 900; color: var(--neon); text-shadow: 0 0 15px var(--neon); }

        /* --- MOBILE ADJUSTMENTS --- */
        @media (max-width: 480px) {
            section { padding: 80px 6% 40px; }
            .logo { font-size: 1rem; }
            .pricing-banner { padding: 30px 15px; }
            .new-price { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">MIDNIGHT MUG.</div>
        <div style="font-size: 0.7rem; color: #444;">PATNA / 2026</div>
    </nav>

    <section class="hero">
        <h1 class="reveal">A <span>Sanctuary</span> For Work</h1>
        <p class="reveal">Designed for thinkers, coders, and late-night productivity. High-speed fiber and premium beans.</p>
    </section>

    <section id="menu">
        <div class="grid">
            <div class="card reveal">
                <img src="https://images.unsplash.com/photo-1541167760496-1628856ab772?q=80&w=500">
                <h3>Midnight Latte</h3>
                <p style="color:var(--gold); font-weight:900; margin: 10px 0;">₹180</p>
                <button class="order-btn" onclick="sendOrder('Midnight Latte', '180')">Order via WhatsApp</button>
            </div>
        </div>
    </section>

    <section id="offer">
        <div class="pricing-banner reveal">
            <p style="letter-spacing: 2px; color: #888; font-size: 0.7rem;">SPECIAL PARTNER DEAL</p>
            <div class="old-price">₹5000</div>
            <div class="new-price">₹3499</div>
            <p style="color: var(--neon); margin-top: 10px; font-weight: 600;">Full Website & Order System</p>
        </div>
    </section>

    <script>
        // 1. SCROLL REVEAL (FADE IN/OUT)
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
                else entry.target.classList.remove('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));

        // 2. SFX LOGIC (Mobile Friendly)
        // Click sound for buttons
        const clickSfx = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
        clickSfx.volume = 0.4;

        document.querySelectorAll('.order-btn, .logo').forEach(btn => {
            btn.addEventListener('click', () => {
                clickSfx.currentTime = 0;
                clickSfx.play().catch(() => {}); // Play only after user interaction
            });
        });

        // 3. WHATSAPP ORDER
        function sendOrder(item, price) {
            const msg = `*NEW ORDER FROM SITE*%0A*Item:* ${item}%0A*Price:* ₹${price}`;
            window.open(`https://wa.me/919876543210?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
